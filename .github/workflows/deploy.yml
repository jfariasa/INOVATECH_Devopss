name: CI-CD InnovaTech EKS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1
  CLUSTER: innovatech-eks
  NAMESPACE: innovatech

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ptestpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_ENDPOINT: 127.0.0.1
      DB_PORT: "3306"
      DB_USERNAME: root
      DB_PASSWORD: testpass
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
      - name: Instalar JDK 17 (Temurin) con cache de Maven
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test backend VENTAS
        working-directory: ./back-ventas-springboot/api-rest-ventas
        env:
          DB_NAME: ventasdb
        run: mvn -B test
      - name: Test backend DESPACHOS
        working-directory: ./back-bespachos-springboot/api-rest-despacho
        env:
          DB_NAME: despachosdb
        run: mvn -B test

  build-push-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
      - name: Configurar credenciales AWS (temporales de Learner Lab)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login a Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build & push de las 3 imagenes
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/innovatech-ventas:$TAG -t $REGISTRY/innovatech-ventas:latest ./back-ventas-springboot/api-rest-ventas
          docker push $REGISTRY/innovatech-ventas:$TAG
          docker push $REGISTRY/innovatech-ventas:latest
          docker build -t $REGISTRY/innovatech-despachos:$TAG -t $REGISTRY/innovatech-despachos:latest ./back-bespachos-springboot/api-rest-despacho
          docker push $REGISTRY/innovatech-despachos:$TAG
          docker push $REGISTRY/innovatech-despachos:latest
          docker build -t $REGISTRY/innovatech-frontend:$TAG -t $REGISTRY/innovatech-frontend:latest ./front-despacho
          docker push $REGISTRY/innovatech-frontend:$TAG
          docker push $REGISTRY/innovatech-frontend:latest
      - name: Conectar kubectl al cluster EKS
        run: aws eks update-kubeconfig --name $CLUSTER --region $AWS_REGION
      - name: Deploy (actualiza la imagen de cada Deployment)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          kubectl -n $NAMESPACE set image deployment/ventas ventas=$REGISTRY/innovatech-ventas:$TAG
          kubectl -n $NAMESPACE set image deployment/despachos despachos=$REGISTRY/innovatech-despachos:$TAG
          kubectl -n $NAMESPACE set image deployment/frontend frontend=$REGISTRY/innovatech-frontend:$TAG
          kubectl -n $NAMESPACE rollout status deployment/ventas --timeout=180s
          kubectl -n $NAMESPACE rollout status deployment/despachos --timeout=180s
          kubectl -n $NAMESPACE rollout status deployment/frontend --timeout=120s
      - name: Estado final
        run: kubectl get pods,svc,hpa -n $NAMESPACE
